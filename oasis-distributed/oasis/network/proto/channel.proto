syntax = "proto3";
package oasis.network;

service CoordinatorService {
  // 1. Worker Registration
  rpc Register(WorkerInfo) returns (WorkerConfig);
  
  // 2. Heartbeat to keep worker alive
  rpc Heartbeat(WorkerId) returns (Empty);
  
  // 3. Long-polling for next round signal. Server holds response until round starts.
  rpc WaitForRound(WorkerId) returns (RoundInfo);
  
  // 4. Fetch agent context directly (followers, groups)
  rpc GetContext(ContextRequest) returns (ContextResponse);
  
  // 5. Submit action to Platform and get result synchronously
  rpc SendAction(ActionRequest) returns (ActionResponse);
  
  // 6. Signal that worker finished all its active agents for the round
  rpc RoundComplete(RoundResult) returns (Empty);

  // 7. Graceful worker unregistration
  rpc Unregister(WorkerId) returns (Empty);
}

message Empty {}

message WorkerId {
  string worker_id = 1;
  string token = 2;
}

message WorkerInfo {
  string worker_id = 1;      // Unique ID for this worker
  int32 max_capacity = 2;    // How many agents it can handle
  string token = 3;          // Auth token (MIROFISH_CLUSTER_TOKEN)
}

message WorkerConfig {
  bool accepted = 1;
  string error_message = 2;
  repeated int32 assigned_agents = 3;  // The static assignment of agent IDs to this worker
  bytes profiles_data = 4;             // Serialize UserInfo / Agent profiles
  int32 total_rounds = 5;
}

message RoundInfo {
  int32 round_num = 1;
  repeated int32 active_agent_ids = 2; // Which assigned agents are active this round for THIS worker
  bool simulation_complete = 3;        // Flag to signal exit
  bytes report_data = 4;               // Optional report data on complete
}

message ContextRequest {
  string worker_id = 1;
  int32 agent_id = 2;
  int32 round_num = 3;
  string token = 4;
}

message ContextResponse {
  bytes context_data = 1; // pickle of (followers, followings, group_context) tuple
}

message ActionRequest {
  string worker_id = 1;
  string message_id = 2;
  int32 agent_id = 3;
  int32 round_num = 4;
  string action_type = 5;
  bytes action_data = 6;   // pickle of action kwargs / objects
  string token = 7;
}

message ActionResponse {
  string message_id = 1;
  int32 agent_id = 2;
  bytes result_data = 3;   // pickle of the Platform action result
  bool success = 4;
  string error_message = 5;
}

message RoundResult {
  string worker_id = 1;
  int32 round_num = 2;
  string token = 3;
}
