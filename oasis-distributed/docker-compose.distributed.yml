# Docker Compose — OASIS Distributed Simulation
# 1 Coordinator + N Workers connected via TLS gRPC
#
# Usage:
#   MIROFISH_CLUSTER_TOKEN=secret docker compose -f docker-compose.distributed.yml up
#   MIROFISH_CLUSTER_TOKEN=secret docker compose -f docker-compose.distributed.yml up --scale worker=3

services:
  # ── Coordinator ──────────────────────────────────
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.coordinator
    container_name: oasis-coordinator
    ports:
      - "50051:50051"
    volumes:
      - tls-certs:/app/certs
      - db-data:/app/data
    environment:
      - MIROFISH_CLUSTER_TOKEN=${MIROFISH_CLUSTER_TOKEN:-default-dev-token}
      - COORDINATOR_PORT=50051
      - CLUSTER_CERT_PATH=/app/certs/.cluster.crt
      - CLUSTER_KEY_PATH=/app/certs/.cluster.key
      - TOTAL_ROUNDS=${TOTAL_ROUNDS:-3}
      - EXPECTED_WORKERS=${EXPECTED_WORKERS:-2}
      - RESUME_FROM_ROUND=${RESUME_FROM_ROUND:-0}
      - LOG_FORMAT=json
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-}
    networks:
      - distributed-net
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── Worker (scalable) ──────────────────────────────
  # Use: docker compose up --scale worker=N
  # Each replica gets a unique WORKER_ID from hostname
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    # No container_name — allows docker compose --scale worker=N
    depends_on:
      coordinator:
        condition: service_healthy
    volumes:
      - tls-certs:/app/certs:ro
    environment:
      - MIROFISH_CLUSTER_TOKEN=${MIROFISH_CLUSTER_TOKEN:-default-dev-token}
      - COORDINATOR_ADDR=coordinator:50051
      - CLUSTER_CERT_PATH=/app/certs/.cluster.crt
      - LOG_FORMAT=json
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-}
      # WORKER_ID will be auto-set from hostname if not provided
    networks:
      - distributed-net

volumes:
  tls-certs:
  db-data:

networks:
  distributed-net:
    driver: bridge
